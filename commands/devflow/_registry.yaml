# devflow Command Registry (v2 — 6-stage pipeline)
# Source of truth for all command definitions.
# Run `node bin/generate-commands.cjs` to regenerate .md files.
#
# Hand-maintained commands are listed in _skip and won't be overwritten.
#
# Entry types:
#   skill:    → skills/my-dev/<file>        (flat skill — preferred)
#   stage:    → skills/my-dev/stages/<file>  (legacy)
#   workflow: → skills/my-dev/workflows/<file> (legacy)

_skip:
  - init

commands:
  # ═══════════════════════════════════════
  # PIPELINE (DEFINE → PLAN → CODE → VERIFY → REVIEW → SHIP)
  # ═══════════════════════════════════════

  spec:
    description: Define feature requirements — interactive Q&A, lock decisions, generate structured spec
    argument-hint: "<feature>"
    objective: Surface gray areas in requirements, lock implementation decisions with the user, and generate a structured feature spec.
    skill: spec.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, AskUserQuestion]

  plan:
    description: Read-only analysis to dependency graph with vertical slices and acceptance criteria
    argument-hint: "<feature>"
    objective: Decompose a feature spec into small, verifiable tasks with dependency ordering and wave-based grouping.
    skill: plan.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, Agent]

  code:
    description: Implement plan with RED-GREEN-REFACTOR-Commit cycle and wave parallelism
    argument-hint: "<feature> [--verify] [--review-each] [--sequential]"
    objective: Execute the implementation plan task by task with TDD cycle, atomic commits, and optional wave parallelism.
    skill: code.md
    allowed-tools: [Read, Write, Edit, Bash, Glob, Grep, Agent, AskUserQuestion]

  test:
    description: Run verification — unit, integration, e2e tests, smoke checks
    argument-hint: "<feature> [--smoke]"
    objective: Run test suites to verify implementation correctness. Prove-It pattern for bugs.
    skill: test.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, AskUserQuestion]

  review:
    description: Five-axis code review — correctness, readability, architecture, security, performance
    argument-hint: "<feature>"
    objective: Conduct a structured code review across five dimensions with severity-labeled findings.
    skill: review.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, Agent]

  ship:
    description: Strategy-driven shipping — docker, k8s, or ci-cd with rollback plan
    argument-hint: "[tag] [--strategy docker|k8s|ci-cd] [--rollback]"
    objective: Build, deploy, and verify using the configured shipping strategy. Includes pre-ship checklist and rollback capability.
    skill: ship.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, AskUserQuestion]

  # ═══════════════════════════════════════
  # INDEPENDENT SKILLS
  # ═══════════════════════════════════════

  debug:
    description: Investigation mode — structured debugging with context gathering
    argument-hint: "[topic]"
    objective: Enter structured investigation mode to diagnose issues with hypothesis tracking and experience persistence.
    skill: debug.md
    allowed-tools: [Read, Write, Edit, Bash, Glob, Grep, WebSearch, Agent]

  vllm-opt:
    description: vLLM performance optimization — profiler, kernel analysis, benchmarks
    argument-hint: "[--profile|--kernel|--bench|--full]"
    objective: Run vLLM-specific performance analysis including torch profiler, nsight kernel classification, and benchmarks.
    skill: vllm-opt.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, Agent, AskUserQuestion]

  grafana-setup:
    description: Deploy Grafana monitoring stack in a k8s cluster
    argument-hint: "[--cluster <name>]"
    objective: Set up Grafana + Prometheus monitoring in the specified Kubernetes cluster.
    skill: grafana-setup.md
    allowed-tools: [Read, Write, Bash, Glob, Grep]

  learn:
    description: Research a topic (code, URL, or file) and create/update wiki pages
    argument-hint: "<topic|feature|URL|filepath>"
    objective: Research a topic from any source and build/update focused, interlinked wiki pages.
    skill: learn.md
    allowed-tools: [Read, Write, Bash, Glob, Grep, WebSearch, WebFetch, Agent]

  code-simplify:
    description: Simplify code for clarity and maintainability — reduce complexity without changing behavior
    argument-hint: "[scope]"
    objective: Review changed code for simplification opportunities. Reduce complexity while preserving exact behavior.
    skill: code-simplify.md
    allowed-tools: [Read, Write, Edit, Bash, Glob, Grep]

  quick:
    description: Execute ad-hoc task with atomic commits — skip full pipeline
    argument-hint: '"<description>" [--discuss] [--research]'
    objective: Execute a small task (max 3 tasks) with atomic commits, bypassing the full spec/plan pipeline.
    skill: quick.md
    allowed-tools: [Read, Write, Edit, Bash, Glob, Grep, Agent, AskUserQuestion]

  # ═══════════════════════════════════════
  # SESSION & UTILITY COMMANDS
  # ═══════════════════════════════════════

  pause:
    description: Save session state for later resume — writes HANDOFF.json and updates STATE.md
    objective: Capture the current session state into HANDOFF.json and STATE.md for zero-loss session handoff.
    skill: pause.md
    allowed-tools: [Read, Write, Bash, Glob, Grep]

  resume:
    description: Restore session state and show current status
    objective: Restore worktree state, active tasks, and pending items from .dev.yaml and state files.
    skill: resume.md
    allowed-tools: [Read, Bash, Glob, Grep]

  status:
    description: Project overview — config, worktrees, deployments, pipeline stage
    objective: Display a comprehensive project overview including config, worktree states, active deployments, and pipeline stage.
    init-as: status
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Parse $INIT JSON. Display: active feature, current phase, repos (commits ahead, uncommitted), cluster info, build history, wiki health. Format as dashboard table."

  diff:
    description: Show worktree changes across repositories
    argument-hint: "[repo]"
    objective: Display a summary of uncommitted and staged changes across all worktrees managed by the project.
    init-as: diff
    context-prefix: "diff"
    inline-process: "For each repo in $INIT, run git -C <dev_worktree> diff --stat <base_ref>. If specific repo given, show full diff. Otherwise show summary table."

  next:
    description: Auto-detect project state and suggest the next workflow step
    objective: Read project state and suggest the most logical next action based on current phase and artifacts.
    init-as: next
    allowed-tools: [Read, Bash, Glob, Grep, AskUserQuestion]
    inline-process: "Read phase from $INIT. Route: spec->plan, plan->code, code->test, test->review, review->ship. Check for HANDOFF.json (resume). Check for failed review (re-code). Suggest command."

  switch:
    description: Switch active feature context
    argument-hint: "<feature-name>"
    objective: Switch the active feature by updating defaults.active_feature in .dev.yaml.
    init-as: switch
    allowed-tools: [Read, Write, Bash, Glob, AskUserQuestion]
    references:
      - "@../../skills/my-dev/references/schema.md"
    inline-process: "List available features from $INIT. If target given, update .dev.yaml active_feature. Otherwise prompt user to select."

  clean:
    description: Cleanup resources — worktrees, images, K8s resources
    argument-hint: "[--dry-run]"
    objective: Scan for and optionally remove orphan worktrees, stale container images, and stale K8s pods.
    init-as: clean
    allowed-tools: [Read, Bash, Glob, Grep, AskUserQuestion]
    inline-process: "Scan worktrees (orphans not in any feature scope), images (stale), pods (Error/CrashLoop). Report findings. With --dry-run, only report. Otherwise confirm each category before cleanup."

  cluster:
    description: Manage Kubernetes clusters — add, use, list
    argument-hint: "<add|use|list> [name]"
    objective: Manage cluster profiles in .dev.yaml.
    init-as: cluster
    allowed-tools: [Read, Write, Bash, Glob, AskUserQuestion]
    inline-process: "Parse action (add/use/list). LIST: show clusters + active. USE: switch active_cluster. ADD: interactive cluster config collection, save to .dev.yaml."

  log:
    description: Quick checkpoint — save progress snapshot to devlog
    argument-hint: "[message]"
    objective: Record a quick checkpoint in the devlog.
    init-as: log
    allowed-tools: [Read, Write, Bash]
    inline-process: "Run: node $DEVFLOW_BIN checkpoint --action $ARGUMENTS"

  knowledge:
    description: Wiki operations — search, lint, list
    argument-hint: "<search|lint|list> [query]"
    objective: Manage the wiki knowledge base — search for answers, run health checks, or list pages.
    init-as: knowledge
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Parse action (search/lint/list). SEARCH: match wiki/index.md, load pages, synthesize. LINT: check over-long, stale, orphans, dead links. LIST: display index."
