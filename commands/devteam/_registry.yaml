# devteam Command Registry
# Source of truth for Claude/Codex command definitions.
# Run `node bin/generate-commands.cjs` to regenerate .md files.
#
# This registry intentionally exposes only the lightweight .devteam workspace
# workflow. Older feature-pipeline commands still exist in the CLI for now, but
# are not part of the daily agent-facing surface.

_skip: []

commands:
  workspace:
    description: Workspace management — scaffold .devteam layout and agent onboarding/context
    argument-hint: "<scaffold|onboard|context> [--root <path>] [--name <name>] [--write] [--force] [--for codex|claude|human] [--text]"
    objective: Create a clean devteam workspace skeleton and generate/read the agent onboarding protocol for any .devteam workspace.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" workspace $ARGUMENTS`. For scaffold, display created/skipped files, cleaned legacy metadata, and next_action; use --force only when intentionally replacing an existing skeleton config and --clean-legacy only when intentionally removing old migration-only metadata. For onboard, render AGENTS.md, CLAUDE.md, and README.devteam.md from .devteam/config.yaml; dry-run by default, write only with --write, and overwrite drifted files only with --force. For context, print the dynamic agent context: workspace identity, track selection policy, active/parked/archived tracks, selected/default track, primary next action, and first commands. This command does not choose concrete repos, branches, remote venvs, image tags, or cluster targets."

  doctor:
    description: Workspace doctor — checks local worktrees, env/sync readiness, and agent onboarding
    argument-hint: "[agent-onboarding] [--root <path>] [--set <workspace-set>] [--profile <env-profile>] [--text]"
    objective: Run the local-to-remote workspace doctor or check that Claude/Codex onboarding is ready for a .devteam workspace.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" doctor $ARGUMENTS`. Without subcommands, display status, problems, workspace totals, env status, sync totals, run-history health, and next_action. If history has invalid run metadata, review `session archive-plan` before cleaning it up with `session archive --yes`. With `doctor agent-onboarding`, check AGENTS.md, CLAUDE.md, dynamic workspace context, track picker readiness, and devteam-console/devteam-status skill availability; use `workspace onboard --write` to create missing onboarding files."

  track:
    description: Track management — list, inspect, or switch active workspace tracks
    argument-hint: "<list|status|context|bind|use> [track] [--root <path>] [--set <track>] [--text] [--no-runtime] [--active-only] [--dry-run]"
    objective: Inspect tracks, print selected-track agent context, bind one track to the current terminal/session, or update the workspace default profile bundle.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" track $ARGUMENTS`. Track selection order is --set, DEVTEAM_TRACK/DEVTEAM_WORKSPACE_SET, then .devteam/config.yaml defaults.workspace_set. Track names accept canonical names plus configured aliases, normalized for spaces, underscores, and hyphens; if an alias is ambiguous, ask the user to choose the canonical track. For list, display each workspace set with aliases, lifecycle status, inferred env, sync, build, deploy flow, validation profile, repo count, selected marker, workspace dirty/missing totals, latest run phase, and presence hints; pass --text for the compact track dashboard and --no-runtime to skip workspace/run/presence inspection. Tracks may declare status: active, parked, or archived. With --active-only, show active tracks plus selected/default, dirty/missing, presence, or unfinished-run tracks; omit it to inspect all tracks. For status, display selected track source, workspace default, inferred profile bundle, active worktree totals, dirty worktrees, latest run, and next action. For context, print an agent-focused selected-track context covering purpose, worktrees, remote env/venv, sync, build/deploy profiles, latest run, presence, and primary next action. For bind <track>, print an export DEVTEAM_TRACK command for this terminal/session without modifying config. For use <track>, update only the defaults block in .devteam/config.yaml; use --dry-run to preview and avoid it when multiple sessions may be active. This command does not touch worktrees, remote servers, images, or clusters."

  presence:
    description: Session presence — soft-lock hints for concurrent track work
    argument-hint: "<list|touch|clear> [--root <path>] [--set <track>] [--session-id <id>] [--purpose <text>] [--run <id>] [--ttl-seconds <n>] [--text] [--yes]"
    objective: Record and inspect lightweight active-session presence under .devteam/presence without blocking work.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" presence $ARGUMENTS`. touch writes/refreshes .devteam/presence/<session-id>.json for the selected track with optional run and purpose. list shows active entries grouped by track; pass --all to include expired entries and --ttl-seconds to override the default 45 minute TTL. clear is dry-run by default and removes selected or expired entries only with --yes. Presence is a soft-lock hint only; it never blocks sync, record, build, publish, or deploy."

  session:
    description: Run session — start, snapshot, status, or record workspace validation runs
    argument-hint: "<start|snapshot|status|handoff|record|list|lint|archive-plan|archive|supersede-plan|supersede-stale|close|supersede|reopen> [--root <path>] [--set <workspace-set>] [--run <id>] [--limit <n>] [--text] [--all] [--yes] [--kind <kind>] [--status <status>] [--summary <text>] [--pytest-log <path>] [--remote-pytest-log <path>]"
    objective: Create, inspect, and update an auditable .devteam/runs/<id>/ directory for the local-to-remote validation loop.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" session start $ARGUMENTS` unless the user explicitly asks for snapshot, status, handoff, record, list, lint, archive-plan, archive, supersede-plan, supersede-stale, close, supersede, or reopen. For start, display run_id, path, readme_path, workspace_set, profiles, and readiness status. Use --no-build --no-deploy for source/venv validation sessions before a concrete image or pre-production target has been chosen. For status, display phase, latest evidence, workspace totals, sync/image/deploy/deploy-verify/publish gates, publish-after-validation plan, and next_actions; if --run is omitted it reads the latest open readable run, skips historical runs that no longer match current config, and honors --set to pick the latest run for one track. For handoff, print an agent-focused continuation packet with workspace, track, run, lifecycle, stale-head status, profiles, worktrees, verified evidence, do-not rules, and next actions; use it before context switches or when handing work to another session. session list is read-only and displays recent open runs, phase, evidence summary, first next_action, and supports --set, --limit, --all, and --text. session lint is read-only and reports malformed run metadata, runs referencing deleted workspace sets/profiles, and stale worktree-head evidence; by default it ignores closed/superseded runs, with --all it audits full history, and with --set its latest_run_id is scoped to that track. session supersede-plan previews stale old runs that have newer open runs on the same track, while blocking each track's latest stale run; session supersede-stale is dry-run by default and marks only supersedeable stale runs when --yes is passed. session close/supersede/reopen update session.json lifecycle metadata without moving evidence; superseded and closed runs stay auditable but are ignored by default active history. session archive-plan is read-only and lists only invalid metadata runs that can be moved to .devteam/runs-archive/. session archive is dry-run by default and moves those invalid run directories only with --yes. session status/handoff/list/lint/archive-plan/archive print JSON by default; pass --text for compact text. For record, append completed step evidence to events.jsonl and README.md with --run, --kind, --status, --summary, and optional --command/--log/--artifact; it refuses closed/superseded runs unless --allow-closed is passed. For pytest, use --pytest-log or --remote-pytest-log to infer kind=test, passed/failed status, and summary from the pytest terminal line."

  status:
    description: Latest run status — one-screen workspace/run overview
    argument-hint: "[--root <path>] [--set <workspace-set>] [--run <id>] [--json]"
    objective: Display the latest .devteam/runs/<id>/ status, including workspace state, run evidence, gates, publish plan, and next actions.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" status $ARGUMENTS`. This is a shortcut for session status: if --run is omitted, it reads the latest run whose session metadata still matches current .devteam/config.yaml, skipping malformed/deleted-track history; pass --set to select the latest readable run for one track. By default it prints compact text for daily use; pass --json for the full structured payload. Display phase, latest evidence, workspace totals, sync/image/deploy/deploy-verify/publish gates, publish-after-validation plan, and next_actions."

  ws:
    description: Workspace inventory — local repo/worktree status
    argument-hint: "<status|materialize|publish-plan|publish> [--root <path>] [--set <workspace-set>] [--text] [--full] [--limit <n>] [--apply] [--run <id>] [--yes]"
    objective: Inspect local worktrees from .devteam/config.yaml without loading the legacy feature pipeline.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" ws $ARGUMENTS`. For status, display one row per worktree: id, repo, path, branch, dirty, dirty_file_count, dirty_summary, dirty_files, commits_ahead, exists, source_exists; pass --text for the compact terminal view, --full for the full captured dirty file list, or --limit <n> to cap dirty file lines. For materialize, display planned clone commands; only use --apply when the user explicitly asks to create local clones. For publish-plan, display publish.after_validation worktrees, branch/dirty/remote-ref state, run_gate when --run is passed, blocked_by reasons, and generated git push commands. For publish, dry-run by default, require a ready run gate by default, execute only with --yes, and record publish evidence to the run."

  env:
    description: Environment profiles — list, doctor, or refresh remote/k8s profiles
    argument-hint: "<list|doctor|refresh> [--root <path>] [--profile <name>] [--remote] [--yes] [--run <id>]"
    objective: Inspect lightweight remote_dev and k8s environment profiles, and refresh vLLM editable remote venvs when explicitly requested.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" env $ARGUMENTS`. For doctor, display local command checks and missing profile fields. --remote performs explicit read-only SSH checks. With doctor --remote --run <id>, append an env-doctor event to that run. For refresh, show the generated command unless --yes is present; only execute remote editable venv refresh with explicit --yes. With refresh --yes --run <id>, append an env-refresh event to that run."

  sync:
    description: Sync planning — local worktrees to remote development environment
    argument-hint: "<plan|apply|status> [--root <path>] [--set <workspace-set>] [--profile <env-profile>] [--patch-mode <branch-patch|dirty-only>] [--dirty-only] [--branch-patch] [--include-assets] [--yes] [--run <id>]"
    objective: Generate an explicit rsync plan for local-to-remote development testing.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" sync plan $ARGUMENTS` unless another subcommand is provided. Display syncable/missing totals, patch mode, patch file counts, and generated commands. For relative patch sync strategies, branch-patch syncs base_ref..HEAD plus dirty/staged/untracked files and remains the default for sync plan/apply; dirty-only syncs only current working tree, staged, and untracked files for daily incremental validation. `sync apply` is dry-run by default; only pass --yes when the user explicitly asks to execute rsync. With apply --yes --run <id>, append a sync event to that run."

  remote-loop:
    description: Remote validation loop — start, sync, doctor, refresh, record tests, and status for the active track
    argument-hint: "<plan|start|doctor|refresh|sync|record-test|status> [--root <path>] [--set <workspace-set>] [--run <id>] [--yes] [--branch-patch] [--remote-pytest-log <path>] [--text]"
    objective: Run the active track's lightweight local-to-remote source/venv validation loop without choosing image or deployment recipes.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" remote-loop $ARGUMENTS`. plan prints the concrete command sequence for the selected track; pass --text for the compact terminal view. If the latest open run is stale because worktree HEAD changed, keep start/status visible but use <fresh-run-id> for evidence-writing commands. start creates a no-build/no-deploy run; pass --text to print the new run id plus concrete doctor/sync/record-test follow-up commands. doctor runs env doctor --remote and records env-doctor evidence. refresh only executes with --yes and records env-refresh evidence. sync shows dirty-only sync by default, only applies with --yes, records sync evidence, and accepts --branch-patch when rebuilding the remote mirror from the full branch patch. record-test records local or remote pytest logs with --pytest-log or --remote-pytest-log. status shows compact status for the latest open selected-track run; closed and superseded runs are ignored by default. If --run is omitted and the latest open run is stale, mutating/recording subcommands refuse before remote side effects; start a fresh run first and pass its --run id. Test execution remains manual and per-change."

  image:
    description: Image planning and evidence recording for a workspace set
    argument-hint: "<plan|prepare|record> [--root <path>] [--set <workspace-set>] [--profile <build-profile>] [--run <id>] [--output <path>] [--image <ref>] [--digest <digest>]"
    objective: Show the build contract, target image, source heads, gates, and patch safety before an image build; prepare dry-run build contexts; record completed image build evidence.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" image plan $ARGUMENTS` unless the user explicitly asks for prepare or record. Display mode, builder, target image, source_heads, recipe, strategy, gates, missing fields, unsafe_patch_files, notes, and next_action. Treat command as optional because new build profiles are contracts first. `image prepare` may materialize a local .devteam/image-contexts context but must not run Docker or push images. Do not execute remote builds unless the user explicitly asks. Use image record after a build completes to update events.jsonl and README.md."

  deploy:
    description: Deploy planning and evidence recording for k8s pre-production validation
    argument-hint: "<plan|record|verify-record> [--root <path>] [--set <workspace-set>] [--profile <deploy-profile>] [--run <id>] [--namespace <namespace>] [--image <ref>]"
    objective: Show the k8s deployment profile and migrated deploy commands for pre-production validation, then record deployment and post-deploy verification evidence separately.
    allowed-tools: [Read, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" deploy plan $ARGUMENTS`. Display namespace, env, guide, gateway recipe, migrated deploy commands, run_gate, verify_gate, and next_action. Do not mutate the cluster unless the user explicitly asks. Use deploy record after deploying the image, then deploy verify-record after health checks, smoke traffic, or benchmark validation pass."

  skill:
    description: Skill management — discover, lint, and install devteam Codex skills
    argument-hint: "<list|status|lint|install> [name] [--root <path>] [--target <path>] [--all] [--yes] [--text]"
    objective: Manage repo/workspace Codex skill folders separately from knowledge docs.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" skill $ARGUMENTS`. list/status shows repo skills plus workspace .devteam/skills folders, their install target, and whether installed copies are missing/current/drift/invalid. lint validates SKILL.md frontmatter, folder/name alignment, and duplicate sources. install is dry-run by default; only use --yes when the user explicitly asks to copy skill folders into the target skills directory. Default target is ~/.agents/skills; use --target to override."

  knowledge:
    description: Knowledge operations — list/search/lint/capture recipes, wiki, and skills
    argument-hint: "<list|search|lint|capture> [query] [--root <path>] [--type <wiki|recipes|skills|all>] [--run <id>] [--apply]"
    objective: Manage the lightweight .devteam knowledge layer: recipes, wiki notes, reusable skills, and run-to-knowledge capture drafts.
    allowed-tools: [Read, Write, Bash, Glob, Grep]
    inline-process: "Run `node \"$DEVTEAM_BIN\" knowledge $ARGUMENTS`. list and search are read-only and cover .devteam/wiki, .devteam/recipes, and .devteam/skills. lint checks missing knowledge dirs, overlong markdown, wiki index coverage, and dead wikilinks. capture reads a run and creates a draft by default; only write it with --apply, and use --to wiki or --to recipes to choose the target."
