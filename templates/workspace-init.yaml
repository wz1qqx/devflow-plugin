# devflow Workspace Configuration Template
# Copy this to your project root as .dev.yaml and customize

schema_version: 2

# ═══════════════════════════════════════
# WORKSPACE (shared by all features)
# ═══════════════════════════════════════

workspace: ~/my-project               # Root workspace directory
# vault: ~/Obsidian/MyVault           # Optional: Obsidian vault for knowledge persistence

repos:
  # Define your repositories here
  my-repo:
    upstream: https://github.com/org/repo
    baselines:
      main: my-repo-main              # worktree directory name for baseline

# build_server:                       # Optional: remote build server
#   ssh: user@build-server
#   work_dir: /data/builds
#   registry: registry.example.com

# clusters:                           # Optional: K8s clusters
#   dev:
#     ssh: user@jump-server
#     namespace: my-namespace
#     safety: normal                   # normal | prod
#     hardware:
#       gpu: "8x A100"

# devlog:                             # Optional: devlog configuration
#   group: my-project
#   checkpoint: "{vault}/{group}/devlog/{feature}-checkpoint.md"
#   investigation: "{vault}/{group}/devlog/{topic}-investigation.md"

# observability:                      # Optional: monitoring configuration
#   prometheus:
#     url: http://prometheus:9090
#   grafana:
#     url: http://grafana:3000

defaults:
  # active_feature: my-feature     # Uncomment after creating a feature with /devflow:init feature
  # active_cluster: dev

# ═══════════════════════════════════════
# FEATURES (each feature is independent)
# ═══════════════════════════════════════

features:
  my-feature:
    description: "Brief description of what this feature does"
    phase: init                        # Lifecycle: init → spec → plan → exec → review → build → deploy → verify
    scope:
      my-repo:
        base_ref: main                 # Base reference (branch/tag) to diff against
        dev_worktree: my-repo-dev      # Worktree directory for development
    invariants:
      source_restriction: dev_worktree_only    # Only modify files in dev worktrees
    # hooks:                           # Optional: lifecycle hooks
    #   pre_build: []
    #   post_deploy: []
    # build:                           # Optional: build configuration
    #   manifest: my-manifest
    # deploy:                          # Optional: deploy configuration
    #   yaml_file: deploy.yaml
    #   dgd_name: my-deployment
